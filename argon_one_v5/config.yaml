name: "Argon ONE V5 Fan Control"
description: "Fan and OLED control for Argon ONE V5 case with System Monitor integration"
version: "2.0.0"
slug: "argon_one_v5"
init: false
arch:
  - aarch64
startup: application
boot: auto
devices:
  - /dev/i2c-1
homeassistant_api: true
options:
  screen_duration: 10
  screens:
    - "system_overview"
    - "storage_info"
    - "network_stats"
    - "temperatures"
schema:
  screen_duration: "int(5,60)"
  screens:
    - "list(system_overview|storage_info|network_stats|temperatures|memory_detail|cpu_detail)"
